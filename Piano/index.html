<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano Simples</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="piano-container">
        <div class="piano">  
            
            <div class="item-tecla">
                <div class="tecla branca" data-nota="C4"></div>
                <span class="legenda">A</span>
            </div>
            
            <div class="item-tecla">
                <div class="tecla preta" data-nota="Db4"></div>
                <span class="legenda">W</span>
            </div>

            <div class="item-tecla">
                <div class="tecla branca" data-nota="D4"></div>
                <span class="legenda">S</span>
            </div>

            <div class="item-tecla">
                <div class="tecla preta" data-nota="Eb4"></div>
                <span class="legenda">E</span>
            </div>

            <div class="item-tecla">
                <div class="tecla branca" data-nota="E4"></div>
                <span class="legenda">D</span>
            </div>

            <div class="item-tecla">
                <div class="tecla branca" data-nota="F4"></div>
                <span class="legenda">F</span>
            </div>

            <div class="item-tecla">
                <div class="tecla preta" data-nota="Gb4"></div>
                <span class="legenda">T</span>
            </div>

            <div class="item-tecla">
                <div class="tecla branca" data-nota="G4"></div>
                <span class="legenda">G</span>
            </div>

            <div class="item-tecla">
                <div class="tecla preta" data-nota="Ab4"></div>
                <span class="legenda">Y</span>
            </div>

            <div class="item-tecla">
                <div class="tecla branca" data-nota="A4"></div>
                <span class="legenda">H</span>
            </div>

            <div class="item-tecla">
                <div class="tecla preta" data-nota="Bb4"></div>
                <span class="legenda">U</span>
            </div>

            <div class="item-tecla">
                <div class="tecla branca" data-nota="B4"></div>
                <span class="legenda">J</span>
            </div>

            <div class="item-tecla">
                <div class="tecla branca" data-nota="C5"></div>
                <span class="legenda">K</span>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
