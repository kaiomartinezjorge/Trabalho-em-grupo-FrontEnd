<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano Simples</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="piano-wrapper">
        
        <div class="piano">  
            
            <div class="key-item"> <!-- agrupa uma tecla e uma nota-->
                <div class="key white" data-note="C4"></div>
                <span class="label">A</span> <!-- fica à mostra pra saber qual letra usar pra cada nota-->
            </div>
            
            <div class="key-item">
                <div class="key black" data-note="Db4"></div>
                <span class="label">W</span>
            </div>
            <div class="key-item">
                <div class="key white" data-note="D4"></div>
                <span class="label">S</span>
            </div>
            <div class="key-item">
                <div class="key black" data-note="Eb4"></div>
                <span class="label">E</span>
            </div>
            <div class="key-item">
                <div class="key white" data-note="E4"></div>
                <span class="label">D</span>
            </div>
            <div class="key-item">
                <div class="key white" data-note="F4"></div>
                <span class="label">F</span>
            </div>
            <div class="key-item">
                <div class="key black" data-note="Gb4"></div>
                <span class="label">T</span>
            </div>
            <div class="key-item">
                <div class="key white" data-note="G4"></div>
                <span class="label">G</span>
            </div>
            <div class="key-item">
                <div class="key black" data-note="Ab4"></div>
                <span class="label">Y</span>
            </div>
            <div class="key-item">
                <div class="key white" data-note="A4"></div>
                <span class="label">H</span>
            </div>
            <div class="key-item">
                <div class="key black" data-note="Bb4"></div>
                <span class="label">U</span>
            </div>
            <div class="key-item">
                <div class="key white" data-note="B4"></div>
                <span class="label">J</span>
            </div>
            <div class="key-item">
                <div class="key white" data-note="C5"></div>
                <span class="label">K</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
