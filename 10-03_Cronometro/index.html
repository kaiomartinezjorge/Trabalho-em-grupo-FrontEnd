<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cronômetro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Cronômetro</h1>
        <div class="timer">
            <div class="tempo" id="minutos">00</div>
            <div class="separador">:</div>
            <div class="tempo" id="segundos">00</div>
            <div class="separador">:</div>
            <div class="tempo" id="milesimos">000</div>
        </div>
        <div class="buttons">
            <button class="btn" id="botaoiniciar">Iniciar</button>
            <button class="btn" id="botaopausar">Pausar</button>
            <button class="btn" id="botaocontinuar">Continuar</button>
            <button class="btn" id="botaoresetar">Resetar</button>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
